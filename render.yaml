# Render Blueprint — two services: Dockerised Laravel API + static React SPA.
# Fastest path for a single-instance prototype: SQLite on a persistent disk.
# Switch to MySQL later by changing only the DB_* env vars (no code change).
services:
  # ---------------- Backend API (Laravel, Docker) ----------------
  - type: web
    name: epic-quote-v3-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_KEY            # generate: php artisan key:generate --show
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL            # set to the API's own https URL after first deploy
        sync: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: GROQ_API_KEY       # paste the Groq key here (NOT committed)
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: SEED_ADMIN_PASSWORD   # keep stable so the admin login persists across deploys
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: PUBLIC_DISK_ROOT     # local-disk fallback root (used only if Cloudinary is unset)
        value: /var/data/public
      - key: CLOUDINARY_URL       # cloudinary://<key>:<secret>@<cloud> — uploads go here (shared, permanent, CDN)
        sync: false
      # Shopify payment links — set these in the Render dashboard to turn the feature on.
      # (sync:false means "fill the value here in the dashboard"; blank = feature stays off.)
      - key: SHOPIFY_STORE_DOMAIN   # your-store.myshopify.com
        sync: false
      - key: SHOPIFY_API_TOKEN      # Admin API access token (shpat_…)
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET # signing secret from the orders/paid webhook
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2025-01"
      - key: SHOPIFY_LOCATION_ID    # optional: US warehouse location id
        sync: false

  # ---------------- Frontend SPA (React/Vite, static) ----------------
  - type: web
    name: epic-quote-v3-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL       # set to the API service URL, e.g. https://epic-quote-v3-api.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Security headers (prod only — does not affect Vite dev). CSP is defence-in-depth
    # behind the block sanitizer: script-src without 'unsafe-inline' means an injected
    # inline handler (e.g. <img onerror=…>) cannot execute even if a sink is missed.
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
